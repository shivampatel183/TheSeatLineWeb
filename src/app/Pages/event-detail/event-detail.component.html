<div class="event-detail" *ngIf="!isLoading; else loading">
    <header class="event-header">
        <div class="event-header__container">
            <div class="event-header__shell">
                <nav class="breadcrumb">
                    <a routerLink="/">Home</a>
                    <span class="separator">/</span>
                    <span class="current">Event Details</span>
                </nav>


                <div class="event-header__grid">
                    <figure class="event-header__media">
                        <img [src]="event.bannerImageUrl" [alt]="event.title + ' banner'" />
                    </figure>

                    <section class="event-header__content">
                        <div class="event-header__chips">
                            <span class="chip chip--lang" *ngIf="event.language">{{ event.language }}</span>
                            <span class="chip chip--type">{{ event.eventType === 1 ? 'Movie' : 'Event' }}</span>
                        </div>

                        <h1 class="title">{{ event.title }}</h1>

                        <div class="meta">
                            <div class="meta-item">
                                <i class="fas fa-calendar-alt"></i>
                                <span>{{ formattedDate }}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span>{{ event.venueName }}, {{ event.city }}</span>
                            </div>
                        </div>

                        <button class="btn btn-primary">Book Tickets</button>
                    </section>
                </div>
            </div>
        </div>
    </header>

    <main class="event-main">
        <div class="event-main__container">
            <div class="event-layout">
                <!-- Left Column: Details -->
                <div class="event-layout__details">
                    <section class="details-section">
                        <h2 class="section-title">About the Event</h2>
                        <div class="description" [innerHTML]="event.description"></div>
                    </section>
                </div>

                <!-- <app-show-list [shows]="shows"></app-show-list> -->
            </div>
        </div>
    </main>
</div>

<ng-template #loading>
    <div class="loading-state">
        <div class="loader"></div>
        <p>Fetching event details...</p>
    </div>
</ng-template>
